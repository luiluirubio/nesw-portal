service: nesw-portal-api

frameworkVersion: '3'

custom:
  # Stage-specific frontend URLs used in CORS and S3 bucket policy
  frontendUrl:
    staging:    https://staging-portal.neswcorp.com
    production: https://portal.neswcorp.com

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-southeast-1
  stage: ${opt:stage, 'staging'}
  environment:
    STAGE:       ${self:provider.stage}
    FRONTEND_URL: ${env:FRONTEND_URL, '${self:custom.frontendUrl.${self:provider.stage}}'}
    # JWT_SECRET must be set via CI secret. Falls back to a dev-only default
    # when the env var is absent (not when it's empty — CI must always supply it).
    JWT_SECRET:  ${env:JWT_SECRET, 'nesw-portal-dev-secret-change-in-ci'}
    COGNITO_USER_POOL_ID:    ${env:COGNITO_USER_POOL_ID, ''}
    COGNITO_CLIENT_ID:       ${env:COGNITO_CLIENT_ID, ''}
    XENDIT_SECRET_KEY:       ${env:XENDIT_SECRET_KEY, ''}
    XENDIT_WEBHOOK_TOKEN:    ${env:XENDIT_WEBHOOK_TOKEN, ''}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource:
            - arn:aws:dynamodb:${self:provider.region}:*:table/nesw-*
            - arn:aws:dynamodb:${self:provider.region}:*:table/nesw-*/index/*
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
            - s3:DeleteObject
          Resource: arn:aws:s3:::nesw-portal-files-${self:provider.stage}/*

plugins:
  - serverless-plugin-typescript

functions:
  api:
    handler: src/handler.handler
    timeout: 29
    memorySize: 256
    events:
      - http:
          path: /api/{proxy+}
          method: ANY
          cors:
            origin: ${env:FRONTEND_URL, '${self:custom.frontendUrl.${self:provider.stage}}'}
            headers:
              - Content-Type
              - Authorization
              - X-Agent-Id
              - X-Agent-Email
              - X-Requested-With
            allowCredentials: true
      - http:
          path: /api
          method: ANY
          cors:
            origin: ${env:FRONTEND_URL, '${self:custom.frontendUrl.${self:provider.stage}}'}
            headers:
              - Content-Type
              - Authorization
              - X-Agent-Id
              - X-Agent-Email
              - X-Requested-With
            allowCredentials: true

resources:
  Resources:

    PropertiesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: nesw-properties-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: status
            AttributeType: S
          - AttributeName: agentId
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: ByStatus
            KeySchema:
              - AttributeName: status
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: ByAgent
            KeySchema:
              - AttributeName: agentId
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    AgentsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: nesw-agents-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH

    ActivityLogsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: nesw-activity-logs-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: timestamp
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
          - AttributeName: timestamp
            KeyType: RANGE

    LoginHistoryTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: nesw-login-history-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: agentId
            AttributeType: S
          - AttributeName: timestamp
            AttributeType: S
        KeySchema:
          - AttributeName: agentId
            KeyType: HASH
          - AttributeName: timestamp
            KeyType: RANGE

    UsersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: nesw-users-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: email
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: ByEmail
            KeySchema:
              - AttributeName: email
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    DraftsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: nesw-drafts-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: agentId
            AttributeType: S
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: agentId
            KeyType: HASH
          - AttributeName: id
            KeyType: RANGE

    ServicesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: nesw-services-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH

    ProposalsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: nesw-proposals-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH

    BillingsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: nesw-billings-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH

    ClientsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: nesw-clients-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH

    BookingsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: nesw-bookings-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH

    FilesBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: nesw-portal-files-${self:provider.stage}
        # Allow public GET so photo/document URLs render in the browser
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          BlockPublicPolicy: false
          IgnorePublicAcls: false
          RestrictPublicBuckets: false
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders: ['*']
              AllowedMethods: [GET, PUT, POST, DELETE]
              AllowedOrigins:
                - ${env:FRONTEND_URL, '${self:custom.frontendUrl.${self:provider.stage}}'}
                - 'http://localhost:5173'
                - 'http://localhost:5174'
              MaxAge: 3600

    FilesBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref FilesBucket
        PolicyDocument:
          Statement:
            - Sid: PublicReadGetObject
              Effect: Allow
              Principal: '*'
              Action: s3:GetObject
              Resource: !Sub 'arn:aws:s3:::nesw-portal-files-${self:provider.stage}/*'
