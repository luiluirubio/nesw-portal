name: Deploy

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-1

# ─────────────────────────────────────────────────────────────────────────────
# STAGING  (push to main)
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Type-check (runs on every push / PR) ────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm install
      - run: npx tsc --noEmit

  # ── Staging backend ──────────────────────────────────────────────────────
  deploy-backend-staging:
    name: Deploy Backend → Staging
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: backend
    outputs:
      api_url: ${{ steps.api_url.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Validate secrets
        run: |
          [ -n "$JWT_SECRET" ] || (echo "ERROR: JWT_SECRET_STAGING secret is not set" && exit 1)
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET_STAGING }}

      - name: Deploy with Serverless Framework
        run: npx serverless deploy --stage staging --verbose
        env:
          FRONTEND_URL: https://staging-portal.neswcorp.com
          JWT_SECRET:   ${{ secrets.JWT_SECRET_STAGING }}

      - name: Get API Gateway URL
        id: api_url
        run: |
          URL=$(aws cloudformation describe-stacks \
            --stack-name nesw-portal-api-staging \
            --query "Stacks[0].Outputs[?OutputKey=='ServiceEndpoint'].OutputValue" \
            --output text)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

  # ── Staging frontend ─────────────────────────────────────────────────────
  deploy-frontend-staging:
    name: Deploy Frontend → Staging
    runs-on: ubuntu-latest
    needs: deploy-backend-staging
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          VITE_API_URL: ${{ needs.deploy-backend-staging.outputs.api_url }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Sync assets (long-cache)
        run: |
          aws s3 sync dist/ s3://${{ secrets.NESW_PORTAL_S3_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.txt"

      - name: Sync HTML (no-cache)
        run: |
          aws s3 sync dist/ s3://${{ secrets.NESW_PORTAL_S3_BUCKET }} \
            --exclude "*" \
            --include "*.html" \
            --include "*.txt" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.NESW_PORTAL_CF_DIST_ID }} \
            --paths "/*"

# ─────────────────────────────────────────────────────────────────────────────
# PRODUCTION  (push to production branch)
# ─────────────────────────────────────────────────────────────────────────────

  # ── Production backend ───────────────────────────────────────────────────
  deploy-backend-production:
    name: Deploy Backend → Production
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/production'
    defaults:
      run:
        working-directory: backend
    environment: production
    outputs:
      api_url: ${{ steps.api_url.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Validate secrets
        run: |
          [ -n "$JWT_SECRET" ] || (echo "ERROR: JWT_SECRET_PROD secret is not set" && exit 1)
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET_PROD }}

      - name: Deploy with Serverless Framework
        run: npx serverless deploy --stage production --verbose
        env:
          FRONTEND_URL: https://portal.neswcorp.com
          JWT_SECRET:   ${{ secrets.JWT_SECRET_PROD }}

      - name: Get API Gateway URL
        id: api_url
        run: |
          URL=$(aws cloudformation describe-stacks \
            --stack-name nesw-portal-api-production \
            --query "Stacks[0].Outputs[?OutputKey=='ServiceEndpoint'].OutputValue" \
            --output text)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

  # ── Production frontend ──────────────────────────────────────────────────
  deploy-frontend-production:
    name: Deploy Frontend → Production
    runs-on: ubuntu-latest
    needs: deploy-backend-production
    if: github.ref == 'refs/heads/production'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          VITE_API_URL: ${{ needs.deploy-backend-production.outputs.api_url }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Sync assets (long-cache)
        run: |
          aws s3 sync dist/ s3://${{ secrets.NESW_PORTAL_S3_BUCKET_PROD }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.txt"

      - name: Sync HTML (no-cache)
        run: |
          aws s3 sync dist/ s3://${{ secrets.NESW_PORTAL_S3_BUCKET_PROD }} \
            --exclude "*" \
            --include "*.html" \
            --include "*.txt" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.NESW_PORTAL_CF_DIST_ID_PROD }} \
            --paths "/*"
