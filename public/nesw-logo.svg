<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 520" fill="none">
  <!--
    NESW Logo — two interlocking paths:
    · Blue  (#1A5EA8) : vertical figure-8 — teardrop loop top + circle loop bottom
    · Orange (#F4870E) : horizontal scroll — double-scroll loop left + right
    They weave through each other at the centre (blue over orange).
  -->

  <!-- ═══ ORANGE — drawn first so blue sits on top at the crossing ═══ -->

  <!-- Right outer scroll loop -->
  <path stroke="#F4870E" stroke-width="22" stroke-linecap="round" fill="none"
    d="M 268 252
       C 296 234, 355 218, 408 234
       C 461 250, 488 284, 478 318
       C 468 352, 432 370, 392 364
       C 352 358, 318 334, 298 304
       C 278 274, 270 258, 268 252"/>

  <!-- Right inner scroll (tighter inner loop) -->
  <path stroke="#F4870E" stroke-width="22" stroke-linecap="round" fill="none"
    d="M 268 252
       C 284 242, 320 234, 352 246
       C 384 258, 396 282, 382 304
       C 368 326, 336 330, 312 318
       C 298 312, 286 300, 270 282"/>

  <!-- Orange centre segment — left of crossing (under blue) -->
  <path stroke="#F4870E" stroke-width="22" stroke-linecap="round" fill="none"
    d="M 220 272 C 235 260, 250 255, 268 252"/>

  <!-- Left outer scroll loop -->
  <path stroke="#F4870E" stroke-width="22" stroke-linecap="round" fill="none"
    d="M 232 268
       C 204 286, 145 302, 92 286
       C 39 270, 12 236, 22 202
       C 32 168, 68 150, 108 156
       C 148 162, 182 186, 202 216
       C 222 246, 230 262, 232 268"/>

  <!-- Left inner scroll -->
  <path stroke="#F4870E" stroke-width="22" stroke-linecap="round" fill="none"
    d="M 232 268
       C 216 278, 180 286, 148 274
       C 116 262, 104 238, 118 216
       C 132 194, 160 188, 186 200
       C 202 210, 216 228, 232 248"/>

  <!-- ═══ BLUE — drawn on top so it overlays orange at the centre ═══ -->

  <!-- Top teardrop loop -->
  <path stroke="#1A5EA8" stroke-width="22" stroke-linecap="round" fill="none"
    d="M 266 208
       C 278 184, 298 148, 290 106
       C 282 64,  254 40,  226 50
       C 198 60,  188 96,  196 132
       C 204 168, 228 196, 250 214"/>

  <!-- Blue diagonal — upper half (centre crossing, over orange) -->
  <path stroke="#1A5EA8" stroke-width="22" stroke-linecap="round" fill="none"
    d="M 250 214 L 268 252"/>

  <!-- Blue diagonal — lower half -->
  <path stroke="#1A5EA8" stroke-width="22" stroke-linecap="round" fill="none"
    d="M 220 272 L 206 310"/>

  <!-- Bottom circle loop -->
  <path stroke="#1A5EA8" stroke-width="22" stroke-linecap="round" fill="none"
    d="M 206 310
       C 198 334, 192 368, 202 398
       C 212 428, 236 446, 260 438
       C 284 430, 294 404, 284 374
       C 274 344, 252 320, 232 306
       C 222 300, 212 290, 206 310"/>
</svg>
